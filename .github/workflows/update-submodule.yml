name: Update Lab Data Submodule

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule and check for target file changes
        id: check_changes
        run: |
          OLD_HASH=$(git rev-parse :data/hapislab.org)
          git submodule update --remote data/hapislab.org
          NEW_HASH=$(git rev-parse :data/hapislab.org)
          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            cd data/hapislab.org
            if git diff --name-only $OLD_HASH $NEW_HASH | grep -E "src/data/(publications|awards)\.yml"; then
              echo "Target files updated."
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "Submodule updated but target files were not changed."
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
            cd ../..
          else
            echo "No submodule updates found."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hapislab.org
          git commit -m "chore: update lab data (publications/awards)"
          git push
